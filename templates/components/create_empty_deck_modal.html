<div class="modal fade" id="createEmptyDeckModal" tabindex="-1" aria-labelledby="createEmptyDeckModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createEmptyDeckModalLabel">Create New Deck</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createEmptyDeckForm">
                    <div class="mb-3">
                        <label for="emptyDeckName" class="form-label">Deck Name</label>
                        <input type="text" class="form-control" id="emptyDeckName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="emptyDeckDescription" class="form-label">Description (optional)</label>
                        <textarea class="form-control" id="emptyDeckDescription" name="description" rows="3"></textarea>
                    </div>
                    
                    <!-- Add ownership notice for authenticated users -->
                    {% if current_user.is_authenticated %}
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>
                        This deck will be associated with your account.
                    </div>
                    {% else %}
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        You're not logged in. This deck will be public and accessible to everyone.
                        <div class="mt-2">
                            <a href="{{ url_for('auth.login', next=request.path) }}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Login to create a private deck
                            </a>
                        </div>
                    </div>
                    {% endif %}
                    
                    <div id="createEmptyDeckStatus"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="createEmptyDeckForm" class="btn btn-primary">
                    <span class="normal-state">Create Deck</span>
                    <span class="loading-state d-none">
                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                        Creating...
                    </span>
                </button>
            </div>
        </div>
    </div>
</div>
